[model]
path = "./models/test-model.gguf"

[benchmark]
prompt_tokens = 256
generate_tokens = 64
pairs = 4
warmup_pairs = 1
gap_seconds = 0
timeout_minutes = 5

[budgets]
tg = 0.04
pp = 0.06

[preflight]
thermal_settle_seconds = 0
idle_cpu_threshold = 0.30
post_build_cooldown = 0
preflight_timeout = 10

[report]
format = "json"
output_dir = "./test-results"

